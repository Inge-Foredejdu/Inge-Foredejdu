name: Metrics Community

on:
  workflow_call:

jobs:
  community:
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: YOUR_USERNAME

          base: ""

          plugin_stars: yes
          plugin_stars_limit: 6

          plugin_reactions: yes

          plugin_discussions: yes

          plugin_sponsors: yes

          plugin_people: yes

          filename: metrics.community.svg