name: Metrics External

on:
  workflow_call:

jobs:
  external:
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: YOUR_USERNAME

          base: ""

          plugin_pagespeed: yes
          plugin_pagespeed_url: https://yourwebsite.com

          plugin_screenshot: yes
          plugin_screenshot_url: https://yourwebsite.com

          plugin_stock: yes

          plugin_crypto: yes

          filename: metrics.external.svg